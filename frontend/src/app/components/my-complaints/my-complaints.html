<app-navbar></app-navbar>

<div class="complaints-container">
  <h2>My Complaints</h2>

  <div *ngIf="complaints.length === 0" class="no-complaints">
    No complaints found. <a routerLink="/new-complaint">Create one now</a>
  </div>

  <table *ngIf="complaints.length > 0">
    <thead>
      <tr>
        <th>#</th>
        <th>Title</th>
        <th>Description</th>
        <th>Department</th>
        <th>Status</th>
        <th>Created At</th>
        <!-- <th>Action</th> -->
      </tr>
    </thead>

    <tbody>
      <tr
        *ngFor="let complaint of complaints; let i = index"
        class="clickable-row"
        (click)="goToDetails(complaint.id)"
      >
        <td>{{ i + 1 }}</td>
        <td>{{ complaint.title }}</td>
        <td [title]="complaint.description">
          {{ complaint.description }}
        </td>
        <td>{{ complaint.department_name }}</td>

        <td>
          <span
            class="status-badge"
            [class]="'status-' + complaint.status.toLowerCase().replace(' ', '-')"
          >
            {{ complaint.status }}
          </span>
        </td>

        <td>{{ complaint.created_at | date: 'dd/MM/yy, hh:mm a' }}</td>
        <!-- <td></td> -->
      </tr>
    </tbody>
  </table>
</div>
