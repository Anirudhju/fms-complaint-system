<app-navbar></app-navbar>
<div class="complaint-container">
  <div class="complaint-box">
    <h2>Submit New Complaint</h2>
    <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
    <form (ngSubmit)="submitComplaint()">
      <div class="form-group">
        <label>Title:</label>
        <input type="text" [(ngModel)]="title" name="title" required />
      </div>
      <div class="form-group">
        <label>Description:</label>
        <textarea [(ngModel)]="description" name="description" rows="5" required></textarea>
      </div>

      <!-- Image Upload Section -->
      <div class="upload-section">
        <label>Attach Image (optional):</label>

        <div class="upload-wrapper">
          <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" hidden />

          <button type="button" class="upload-button" (click)="fileInput.click()">
            Choose Image
          </button>

          <span class="file-preview" *ngIf="selectedFile">
            {{ selectedFile.name }}
          </span>
        </div>
      </div>

      <div class="form-group">
        <label>Department:</label>
        <select [(ngModel)]="department_id" name="department_id" required>
          <option value="0">Select Department</option>
          <option *ngFor="let dept of departments" [value]="dept.id">
            {{ dept.name }}
          </option>
        </select>
      </div>
      <button type="submit" class="btn-primary">Submit Complaint</button>
    </form>
  </div>
</div>
