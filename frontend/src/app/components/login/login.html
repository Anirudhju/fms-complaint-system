<div class="login-container">
  <div class="login-box">
    <h2>Login to FMS</h2>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Email:</label>
        <input type="email" [(ngModel)]="email" name="email" (input)="clearMessages()" required />
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          (input)="clearMessages()"
          required
        />
      </div>

      <button type="submit" class="btn-primary">Login</button>
    </form>

    <p class="signup-link">Don't have an account? <a routerLink="/signup">Sign up here</a></p>
  </div>
</div>
