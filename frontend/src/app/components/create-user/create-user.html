<app-navbar></app-navbar>

<div class="create-user-container">
  <div class="create-user-box">
    <h2>Create New User</h2>

    <div class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="createUser()">
      <div class="form-group">
        <label>Name: </label>
        <input type="text" [(ngModel)]="name" name="name" required placeholder="Enter full name" />
      </div>

      <div class="form-group">
        <label>Email: </label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="Enter email" />
      </div>

      <div class="form-group">
        <label>Password: </label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="Enter password"
        />
      </div>

      <div class="form-group">
        <label>Role: </label>
        <select [(ngModel)]="role" name="role" required>
          <option value="user">User</option>
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="form-group" *ngIf="role === 'staff'">
        <label>Department: <span class="required"></span></label>
        <select [(ngModel)]="department_id" name="department_id">
          <option [value]="0">Select Department</option>
          <option *ngFor="let dept of departments" [value]="dept.id">
            {{ dept.name }}
          </option>
        </select>
      </div>

      <button type="submit" class="btn-primary">Create User</button>
    </form>
  </div>
</div>
